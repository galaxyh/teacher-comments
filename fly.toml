# Fly.io deployment template per D15 / ARCH-001 §5.2
# Each operator runs `fly launch` and sets <owner> + secrets via `fly secrets set`.

app = "teacher-comments-CHANGE-ME"
primary_region = "nrt"     # Tokyo — lowest latency for Taiwan teachers

[build]
  dockerfile = "backend/Dockerfile"

[mounts]
  source = "data"
  destination = "/app/data"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [services.tcp_checks]
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"

  [[services.http_checks]]
    interval = "30s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"
    grace_period = "30s"
